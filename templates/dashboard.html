<!-- SIGNED DOCUMENT SECTION -->
{% if signed_file and doc_id %}
<div class="card p-3">
    <h5>Signed Document Ready</h5>
    
    <!-- DOWNLOAD -->
    <a href="{{ url_for('download', filename=signed_file) }}" class="btn btn-success mb-3">
        ⬇️ Download Signed Document
    </a>

    <hr>

    <!-- FORWARD FORM -->
    <h6>Forward Document</h6>
    <!-- ✅ Notice the doc_id=doc_id here -->
    <form method="POST" action="{{ url_for('forward_document', doc_id=doc_id) }}">
        <div class="mb-3">
            <label class="form-label"><strong>Forward To</strong></label>
            <select name="forward_to" class="form-control" required>
                <option value="" disabled selected>Select recipient...</option>
                {% for user in users %}
                    <option value="{{ user[0] }}">{{ user[0] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><strong>Copy To (CC)</strong></label>
            <select name="copy_to" class="form-control">
                <option value="">None</option>
                {% for user in users %}
                    <option value="{{ user[0] }}">{{ user[0] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label"><strong>Comment</strong></label>
            <textarea name="comment" class="form-control" rows="3" placeholder="Add a note..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary">📤 Forward Document</button>
    </form>
</div>
{% endif %}
