{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Dashboard</h2>

    <!-- =========================
         SIGN DOCUMENT
    ========================== -->
    <div class="card shadow p-4 mb-4">

        <h4>Sign New Document</h4>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <input type="file" name="file" class="form-control" required>
            </div>

            <div class="mb-3">
                <textarea name="comment" class="form-control" placeholder="Add comment (optional)"></textarea>
            </div>

            <button class="btn btn-primary">
                Sign Document
            </button>

        </form>

        {% if signed_file %}

        <hr>

        <div class="alert alert-success">
            Document signed successfully!
        </div>

        <a href="{{ url_for('download', filename=signed_file) }}" class="btn btn-success">
            Download Signed Document
        </a>

        {% endif %}

    </div>


    <!-- =========================
         FORWARD DOCUMENT
    ========================== -->
    <div class="card shadow p-4">

        <h4>Forward / Copy Document</h4>

        <form method="POST" action="{{ url_for('forward', doc_id=1) }}">

            <!-- Forward To -->
            <div class="mb-3">
                <label>Forward To</label>
                <select name="next_user" class="form-control" required>
                    <option value="">Select user</option>

                    {% for user in users %}
                        <option value="{{ user[0] }}">{{ user[0] }}</option>
                    {% endfor %}

                </select>
            </div>

            <!-- Copy To -->
            <div class="mb-3">
                <label>Copy To</label>
                <select name="copy_user" class="form-control">
                    <option value="">Select user (optional)</option>

                    {% for user in users %}
                        <option value="{{ user[0] }}">{{ user[0] }}</option>
                    {% endfor %}

                </select>
            </div>

            <!-- Comment -->
            <div class="mb-3">
                <textarea name="comment" class="form-control" placeholder="Comment"></textarea>
            </div>

            <button class="btn btn-warning">
                Forward Document
            </button>

        </form>

    </div>

</div>

{% endblock %}
