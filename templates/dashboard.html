<form method="POST" enctype="multipart/form-data">

    <input type="file" name="file" class="form-control" required>

    <input type="text" name="comment" class="form-control mt-2" placeholder="Comment">

    <!-- FORWARD TO -->
    <label class="mt-3">Forward To</label>
    <select name="forward_to" class="form-control">
        <option value="">None</option>
        {% for user in users %}
            <option value="{{ user }}">{{ user }}</option>
        {% endfor %}
    </select>

    <!-- COPY TO -->
    <label class="mt-3">Copy To</label>
    <select name="copy_to" class="form-control">
        <option value="">None</option>
        {% for user in users %}
            <option value="{{ user }}">{{ user }}</option>
        {% endfor %}
    </select>

    <button class="btn btn-primary mt-3">Sign Document</button>

</form>
