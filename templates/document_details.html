{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">📝 Document Signing</h2>

    <!-- UPLOAD & SIGN -->
    <div class="card p-4 mb-4">
        <form method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label">Select Document</label>
                <input type="file" name="file" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Comment (Optional)</label>
                <input type="text" name="comment" class="form-control" placeholder="e.g., Reviewed and approved">
            </div>
            <button type="submit" class="btn btn-primary">🔐 Sign & Save</button>
        </form>
    </div>

    <!-- DOWNLOAD SECTION -->
    {% if signed_file %}
    <div class="card p-4 bg-light">
        <h4>✅ Document Signed Successfully</h4>
        <p class="text-muted">Filename: <code>{{ signed_file }}</code></p>
        <a href="{{ url_for('download', filename=signed_file) }}" class="btn btn-success btn-lg">
            ⬇️ Download Signed Document
        </a>
    </div>
    {% endif %}
</div>
{% endblock %}
