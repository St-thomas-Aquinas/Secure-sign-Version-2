{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h3>📥 Incoming Documents</h3>

    {% if docs %}

        <table class="table table-striped mt-3">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Document</th>
                    <th>Created By</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>

                {% for doc in docs %}

                <tr>

                    <td>{{ doc[0] }}</td>
                    <td>{{ doc[1] }}</td>
                    <td>{{ doc[2] }}</td>
                    <td>{{ doc[3] }}</td>

                    <td>

                        <!-- VIEW DOCUMENT -->
                        <a href="/document/{{ doc[0] }}" class="btn btn-sm btn-info">
                            View
                        </a>

                        <!-- FORWARD DOCUMENT -->
                        <a href="/forward/{{ doc[0] }}" class="btn btn-sm btn-primary">
                            Forward
                        </a>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    {% else %}

        <div class="alert alert-warning mt-3">
            No incoming documents
        </div>

    {% endif %}

</div>

{% endblock %}
