{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h3>Your Incoming Documents</h3>

    {% if docs %}

        <table class="table table-bordered mt-3">

            <tr>
                <th>ID</th>
                <th>Document</th>
                <th>From</th>
                <th>Status</th>
                <th>Action</th>
            </tr>

            {% for doc in docs %}
            <tr>
                <td>{{ doc[0] }}</td>
                <td>{{ doc[1] }}</td>
                <td>{{ doc[2] }}</td>
                <td>{{ doc[3] }}</td>
                <td>
                    <a href="{{ url_for('forward', doc_id=doc[0]) }}" class="btn btn-primary btn-sm">
                        Open
                    </a>
                </td>
            </tr>
            {% endfor %}

        </table>

    {% else %}
        <p>No incoming documents.</p>
    {% endif %}

</div>

{% endblock %}
