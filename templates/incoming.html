{% extends "base.html" %}

{% block content %}

<h3>📥 Incoming Documents</h3>

{% if docs %}

<table class="table table-bordered mt-3">

    <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Document</th>
            <th>Created By</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

    </thead>

    <tbody>

        {% for doc in docs %}

        <tr>

            <td>{{ doc[0] }}</td>
            <td>{{ doc[1] }}</td>
            <td>{{ doc[2] }}</td>
            <td>{{ doc[3] }}</td>

            <td>

                <a
                    href="/document/{{ doc[0] }}"
                    class="btn btn-sm btn-info"
                >
                    View
                </a>

                <a
                    href="/forward/{{ doc[0] }}"
                    class="btn btn-sm btn-primary"
                >
                    Forward
                </a>

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% else %}

<div class="alert alert-warning">
    No incoming documents
</div>

{% endif %}

{% endblock %}
