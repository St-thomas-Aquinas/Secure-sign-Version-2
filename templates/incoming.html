{% extends "base.html" %}

{% block content %}

<div class="card shadow p-4">

    <h3 class="mb-4">
        Incoming Documents
    </h3>

    {% for doc in docs %}

        <div class="border p-3 mb-3">

            <h5>{{ doc[1] }}</h5>

            <p>
                From: {{ doc[2] }}
            </p>

            <p>
                Status: {{ doc[3] }}
            </p>

            <a
                href="/forward/{{ doc[0] }}"
                class="btn btn-primary btn-sm"
            >
                Open & Forward
            </a>

        </div>

    {% endfor %}

</div>

{% endblock %}
