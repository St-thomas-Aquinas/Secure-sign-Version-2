<!DOCTYPE html>
<html>
<head>
    <title>Incoming Documents</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h3>📥 Incoming Documents</h3>

    <table class="table table-bordered">
        <tr>
            <th>Name</th>
            <th>From</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        {% for doc in docs %}
        <tr>
            <td>{{ doc[1] }}</td>
            <td>{{ doc[2] }}</td>
            <td>{{ doc[3] }}</td>

            <td>

                <!-- VIEW -->
                <a href="{{ url_for('view_file', doc_id=doc[0]) }}" class="btn btn-sm btn-primary">
                    View
                </a>

                <!-- TRACK -->
                <a href="{{ url_for('document_details', doc_id=doc[0]) }}" class="btn btn-sm btn-info">
                    Track
                </a>

                <!-- FORWARD -->
                <a href="{{ url_for('forward', doc_id=doc[0]) }}" class="btn btn-sm btn-warning">
                    Forward
                </a>

            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
