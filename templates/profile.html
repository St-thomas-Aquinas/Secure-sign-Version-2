{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h3>👤 My Profile</h3>
    
    <div class="card p-4 mt-3 shadow-sm">
        <h5>Update Phone Number</h5>
        <p class="text-muted">
            Enter your phone number with the country code (e.g., <code>+1234567890</code>) to receive SMS and WhatsApp notifications when you receive documents.
        </p>
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" name="phone_number" class="form-control" value="{{ phone_number }}" placeholder="+1234567890" required>
            </div>
            <button type="submit" class="btn btn-primary">💾 Save Phone Number</button>
        </form>
    </div>
</div>
{% endblock %}
